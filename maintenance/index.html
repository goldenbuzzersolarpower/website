<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body,
        html {
            height: 100%;
            overflow: hidden;
        }

        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('background.jpeg') center/cover no-repeat;
            filter: blur(8px);
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
        }

        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
            animation: fadeIn 1.2s ease;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        p {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.85;
        }

        .countdown {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }

        .time-box {
            text-align: center;
        }

        .time-box span {
            display: block;
        }

        .number {
            font-size: 36px;
            font-weight: bold;
        }

        .label {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .email-box {
            display: flex;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
        }

        .email-box input {
            padding: 12px 15px;
            border: none;
            outline: none;
            width: 250px;
        }

        .email-box button {
            padding: 12px 20px;
            border: none;
            background: #1e88e5;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .email-box button:hover {
            background: #1565c0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }

            .countdown {
                gap: 20px;
            }

            .number {
                font-size: 24px;
            }

            .email-box {
                flex-direction: column;
            }

            .email-box input {
                width: 100%;
            }

            .email-box button {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="background"></div>
    <div class="overlay"></div>

    <div class="content">
        <h1>We're Working On Something Awesome!</h1>
        <p>Our new website is coming soon. Stay tuned for something amazing.</p>

        <div class="countdown">
            <div class="time-box">
                <span class="number" id="days">00</span>
                <span class="label">DAYS</span>
            </div>
            <div class="time-box">
                <span class="number" id="hours">00</span>
                <span class="label">HOURS</span>
            </div>
            <div class="time-box">
                <span class="number" id="minutes">00</span>
                <span class="label">MINUTES</span>
            </div>
            <div class="time-box">
                <span class="number" id="seconds">00</span>
                <span class="label">SECONDS</span>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const launchDate = new Date("2026-03-10T00:00:00").getTime();

            function updateCountdown() {
                const now = new Date().getTime();
                const distance = launchDate - now;

                const daysEl = document.getElementById("days");
                const hoursEl = document.getElementById("hours");
                const minutesEl = document.getElementById("minutes");
                const secondsEl = document.getElementById("seconds");

                if (!daysEl || !hoursEl || !minutesEl || !secondsEl) {
                    return; // stop if elements not found
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                daysEl.innerText = String(days).padStart(2, '0');
                hoursEl.innerText = String(hours).padStart(2, '0');
                minutesEl.innerText = String(minutes).padStart(2, '0');
                secondsEl.innerText = String(seconds).padStart(2, '0');

                if (distance < 0) {
                    document.querySelector(".countdown").innerHTML = "<h2>We're Live!</h2>";
                }
            }

            setInterval(updateCountdown, 1000);
            updateCountdown();

        });
    </script>

</body>

</html>
